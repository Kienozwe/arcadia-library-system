<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcadia Library — Login</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .hero-copy { text-align: center; margin-bottom: 3rem; }
    .hero-copy h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .hero-copy h1 span { color: var(--amber); }
    .hero-copy p { color: var(--text-secondary); font-size: 0.95rem; }
    .quick-demo {
      margin-top: 1.5rem; padding: 1rem 1.25rem;
      background: var(--bg-elevated); border-radius: 10px; border: 1px solid var(--border);
      font-size: 0.8rem; color: var(--text-secondary);
    }
    .quick-demo strong { color: var(--amber); display: block; margin-bottom: 0.5rem; }
    .demo-cred { display: flex; justify-content: space-between; margin-top: 0.35rem; }
    .demo-cred code { color: var(--teal); font-family: var(--font-mono); font-size: 0.78rem; cursor:pointer; }
    .demo-cred code:hover { color: var(--amber); text-decoration: underline; }
  </style>
</head>
<body class="auth-body">
  <div id="toastContainer" class="toast-container"></div>

  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon">📚</div>
      <h1>Arcadia <span style="color:var(--amber)">Library</span></h1>
      <p>Management System</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-form="loginForm">Sign In</button>
        <button class="auth-tab" data-form="registerForm">Register</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.edu" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Sign In</button>
      </form>

      <!-- REGISTER -->
      <form class="auth-form hidden" id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="e.g. Juan dela Cruz">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="your@email.edu">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min. 6 characters">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="regStudentId" placeholder="2024-00000">
          </div>
          <div class="form-group">
            <label>Year Level</label>
            <select id="regYearLevel">
              <option value="">Select Year</option>
              <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Course / Program</label>
          <input type="text" id="regCourse" placeholder="e.g. BS Computer Science">
        </div>
        <div class="form-group">
          <label>Home Address</label>
          <input type="text" id="regAddress" placeholder="Street, City">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </form>

      <div class="quick-demo">
        <strong>🔑 Demo Credentials — click to fill</strong>
        <div class="demo-cred">
          <span>👨‍💼 Admin:</span>
          <code onclick="fillCred('admin@library.edu','admin123')">admin@library.edu / admin123</code>
        </div>
        <div class="demo-cred">
          <span>👨‍🎓 Student:</span>
          <code onclick="fillCred('juan@student.edu','student123')">juan@student.edu / student123</code>
        </div>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script>
    Auth.init();
    function fillCred(email, pass) {
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = pass;
      // Make sure login tab is active
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
      document.querySelector('[data-form="loginForm"]').classList.add('active');
      document.getElementById('loginForm').classList.remove('hidden');
      App.toast('Credentials filled! Click Sign In.', 'info');
    }
  </script>
</body>
</html>
